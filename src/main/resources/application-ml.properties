# Spring Boot Application Configuration
spring.application.name=satellite-analysis

# Server Configuration
server.port=8080

# Python ML Service Configuration
python.ml.service.url=http://localhost:5000
python.ml.service.timeout=30000
python.ml.service.enabled=true

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.irrfzqlarfqhebyqoerl
spring.datasource.password=Amey@2005

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
