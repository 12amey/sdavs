# Server Configuration
server.port=8081
server.servlet.context-path=/

# Database Configuration
# Note: Frontend uses Supabase directly via JavaScript client
# Backend connects to Supabase via Supavisor (connection pooler)
# Using Supavisor Transaction Mode for IPv4 support (Supabase is IPv6-only for direct connections since Jan 2024)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.irrfzqlarfqhebyqoerl
spring.datasource.password=${DB_PASSWORD:your-password-here}

# HikariCP Configuration for better connection pooling
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=45000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.sql.init.mode=always

# Logging
logging.level.com.satellite=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# File Upload Configuration (for satellite images)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2MB

# Application Configuration
app.name=Satellite Data Analysis and Visualization System
app.version=1.0.0
app.description=Advanced satellite data analysis with NDVI processing and real image analysis

# Image Processing Configuration
image.processing.max-width=4000
image.processing.max-height=4000
image.processing.allowed-formats=jpg,jpeg,png,tiff,tif,bmp

# Google OAuth 2.0 Configuration
spring.security.oauth2.client.registration.google.client-id=404889863660-1bqkc29f9skd55ou22559i6lvhi5oljj.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret-here}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Python ML Service Configuration
python.ml.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}
python.ml.service.timeout=60000
python.ml.service.enabled=true

# =====================================================
# AUTOMATED DATABASE UPDATE CONFIGURATION
# =====================================================
# Enable/disable scheduled automatic database updates
satellite.update.enabled=true

# Update frequency using CRON expression
# Default: Every hour at minute 0 (0 0 * * * *)
# Format: second minute hour day month weekday
# Examples:
#   0 0 * * * *     = Every hour
#   0 */15 * * * *  = Every 15 minutes
#   0 0 */6 * * *   = Every 6 hours
#   0 0 2 * * SUN   = Every Sunday at 2 AM (original setting)
satellite.update.cron=0 0 2 */5 * *

# STAC API for satellite imagery
stac.api.url=https://earth-search.aws.element84.com/v1

# Python COG Service URL (for NDVI calculation)
python.cog.url=${PYTHON_COG_URL:http://localhost:5000}

# =====================================================
# OPEN WEATHER MAP API (Optional - for environmental data)
# =====================================================
# Get free API key from: https://openweathermap.org/api
# Free tier: 1000 calls/day
# Leave empty to skip environmental data collection
openweather.api.key=${OPENWEATHER_API_KEY:your-api-key-here}